spring:
  application:
    name: arachne-phase3-redis-session
  main:
    web-application-type: none
  data:
    redis:
      host: localhost
      port: 6379
  session:
    redis:
      namespace: arachne:phase3:sample

arachne:
  strands:
    agent:
      system-prompt: "Remember the latest destination across application restarts."
      conversation:
        window-size: 8
      session:
        id: phase3-redis-demo