services:
  customer-ui:
    build:
      context: ..
      dockerfile: food-delivery-demo/customer-ui/Dockerfile
      args:
        BACKEND_ORIGIN: http://order-service:8080
    environment:
      BACKEND_ORIGIN: http://order-service:8080
      PORT: 3000
      HOSTNAME: 0.0.0.0
    depends_on:
      order-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000 || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 50
      start_period: 20s
    ports:
      - "3000:3000"

  order-service:
    build:
      context: ..
      dockerfile: food-delivery-demo/Dockerfile
      args:
        MODULE_DIR: food-delivery-demo/order-service
        MODULE_ARTIFACT: delivery-order-service
    environment:
      DELIVERY_MODEL_MODE: ${DELIVERY_MODEL_MODE:-deterministic}
      SERVER_PORT: 8080
      MENU_SERVICE_BASE_URL: http://menu-service:8080
      KITCHEN_SERVICE_BASE_URL: http://kitchen-service:8080
      DELIVERY_SERVICE_BASE_URL: http://delivery-service:8080
      PAYMENT_SERVICE_BASE_URL: http://payment-service:8080
      ARACHNE_STRANDS_MODEL_PROVIDER: ${ARACHNE_STRANDS_MODEL_PROVIDER:-}
      ARACHNE_STRANDS_MODEL_ID: ${ARACHNE_STRANDS_MODEL_ID:-}
      ARACHNE_STRANDS_MODEL_REGION: ${ARACHNE_STRANDS_MODEL_REGION:-}
      AWS_REGION: ${AWS_REGION:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/food_delivery
      SPRING_DATASOURCE_USERNAME: delivery
      SPRING_DATASOURCE_PASSWORD: delivery
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      DELIVERY_ORDER_SESSION_STORE: redis
    depends_on:
      menu-service:
        condition: service_healthy
      kitchen-service:
        condition: service_healthy
      delivery-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:8080/actuator/health >/dev/null || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 50
      start_period: 25s
    ports:
      - "8080:8080"

  menu-service:
    build:
      context: ..
      dockerfile: food-delivery-demo/Dockerfile
      args:
        MODULE_DIR: food-delivery-demo/menu-service
        MODULE_ARTIFACT: delivery-menu-service
    environment:
      DELIVERY_MODEL_MODE: ${DELIVERY_MODEL_MODE:-deterministic}
      ARACHNE_STRANDS_MODEL_PROVIDER: ${ARACHNE_STRANDS_MODEL_PROVIDER:-}
      ARACHNE_STRANDS_MODEL_ID: ${ARACHNE_STRANDS_MODEL_ID:-}
      ARACHNE_STRANDS_MODEL_REGION: ${ARACHNE_STRANDS_MODEL_REGION:-}
      AWS_REGION: ${AWS_REGION:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      SERVER_PORT: 8080
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:8080/actuator/health >/dev/null || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 50
      start_period: 20s
    ports:
      - "8081:8080"

  kitchen-service:
    build:
      context: ..
      dockerfile: food-delivery-demo/Dockerfile
      args:
        MODULE_DIR: food-delivery-demo/kitchen-service
        MODULE_ARTIFACT: delivery-kitchen-service
    environment:
      DELIVERY_MODEL_MODE: ${DELIVERY_MODEL_MODE:-deterministic}
      ARACHNE_STRANDS_MODEL_PROVIDER: ${ARACHNE_STRANDS_MODEL_PROVIDER:-}
      ARACHNE_STRANDS_MODEL_ID: ${ARACHNE_STRANDS_MODEL_ID:-}
      ARACHNE_STRANDS_MODEL_REGION: ${ARACHNE_STRANDS_MODEL_REGION:-}
      AWS_REGION: ${AWS_REGION:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      SERVER_PORT: 8080
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:8080/actuator/health >/dev/null || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 50
      start_period: 20s
    ports:
      - "8082:8080"

  delivery-service:
    build:
      context: ..
      dockerfile: food-delivery-demo/Dockerfile
      args:
        MODULE_DIR: food-delivery-demo/delivery-service
        MODULE_ARTIFACT: delivery-routing-service
    environment:
      DELIVERY_MODEL_MODE: ${DELIVERY_MODEL_MODE:-deterministic}
      ARACHNE_STRANDS_MODEL_PROVIDER: ${ARACHNE_STRANDS_MODEL_PROVIDER:-}
      ARACHNE_STRANDS_MODEL_ID: ${ARACHNE_STRANDS_MODEL_ID:-}
      ARACHNE_STRANDS_MODEL_REGION: ${ARACHNE_STRANDS_MODEL_REGION:-}
      AWS_REGION: ${AWS_REGION:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      SERVER_PORT: 8080
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:8080/actuator/health >/dev/null || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 50
      start_period: 20s
    ports:
      - "8083:8080"

  payment-service:
    build:
      context: ..
      dockerfile: food-delivery-demo/Dockerfile
      args:
        MODULE_DIR: food-delivery-demo/payment-service
        MODULE_ARTIFACT: delivery-payment-service
    environment:
      DELIVERY_MODEL_MODE: ${DELIVERY_MODEL_MODE:-deterministic}
      ARACHNE_STRANDS_MODEL_PROVIDER: ${ARACHNE_STRANDS_MODEL_PROVIDER:-}
      ARACHNE_STRANDS_MODEL_ID: ${ARACHNE_STRANDS_MODEL_ID:-}
      ARACHNE_STRANDS_MODEL_REGION: ${ARACHNE_STRANDS_MODEL_REGION:-}
      AWS_REGION: ${AWS_REGION:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      SERVER_PORT: 8080
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:8080/actuator/health >/dev/null || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 50
      start_period: 20s
    ports:
      - "8084:8080"

  redis:
    image: redis:7.4-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: delivery
      POSTGRES_PASSWORD: delivery
      POSTGRES_DB: food_delivery
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U delivery -d food_delivery"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: