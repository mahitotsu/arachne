spring:
  application:
    name: delivery-service
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${DELIVERY_JWK_SET_URI:http://customer-service:8080/oauth2/jwks}

delivery:
  registry:
    base-url: ${DELIVERY_REGISTRY_BASE_URL:}
  delivery:
    endpoint: ${DELIVERY_DELIVERY_ENDPOINT:http://delivery-service:8080}
  model:
    mode: ${DELIVERY_MODEL_MODE:live}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
