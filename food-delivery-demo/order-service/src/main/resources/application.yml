spring:
  application:
    name: order-service
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${DELIVERY_JWK_SET_URI:http://customer-service:8080/oauth2/jwks}
  sql:
    init:
      mode: always

delivery:
  registry:
    base-url: ${DELIVERY_REGISTRY_BASE_URL:}
  order:
    endpoint: ${DELIVERY_ORDER_ENDPOINT:http://order-service:8080}
    session-store: ${DELIVERY_ORDER_SESSION_STORE:redis}
  downstream:
    menu:
      capability-query: ${MENU_CAPABILITY_QUERY:メニュー提案 在庫付き提案 注文候補}
    delivery:
      capability-query: ${DELIVERY_CAPABILITY_QUERY:配送候補 ETA 比較 配送選択肢}
    payment:
      capability-query: ${PAYMENT_CAPABILITY_QUERY:支払い準備 合計確認 課金確定}
    support:
      capability-query: ${SUPPORT_CAPABILITY_QUERY:注文後フィードバック受付 問い合わせ受付 サポート連携}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
