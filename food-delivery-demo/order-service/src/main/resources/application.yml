spring:
  application:
    name: order-service
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${DELIVERY_JWK_SET_URI:http://customer-service:8080/oauth2/jwks}
  sql:
    init:
      mode: always

delivery:
  order:
    session-store: ${DELIVERY_ORDER_SESSION_STORE:redis}

management:
  endpoints:
    web:
      exposure:
        include: health,info
