spring:
  application:
    name: support-service
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${DELIVERY_JWK_SET_URI:http://customer-service:8080/oauth2/jwks}

delivery:
  registry:
    base-url: ${DELIVERY_REGISTRY_BASE_URL:}
  support:
    endpoint: ${DELIVERY_SUPPORT_ENDPOINT:http://support-service:8080}
  downstream:
    order:
      service-name: ${ORDER_SERVICE_NAME:order-service}
      base-url: ${ORDER_SERVICE_BASE_URL:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics