spring:
  application:
    name: menu-service
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${DELIVERY_JWK_SET_URI:http://customer-service:8080/oauth2/jwks}

delivery:
  registry:
    base-url: ${DELIVERY_REGISTRY_BASE_URL:}
  menu:
    endpoint: ${DELIVERY_MENU_ENDPOINT:http://menu-service:8080}
  downstream:
    kitchen:
      capability-query: ${KITCHEN_CAPABILITY_QUERY:在庫確認 調理ライン別 ETA 欠品時の代替承認 混雑時の別ライン提案}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
