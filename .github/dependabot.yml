# Repository-side dependency monitoring for Arachne uses two evidence streams:
# - `mvn -Pquality-security verify` generates CycloneDX SBOM inventory artifacts.
# - GitHub Dependabot uses this manifest configuration to raise update PRs and security alerts for Maven dependencies.
version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"