server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: marketplace-notification-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/marketplace_notification_service}
    driver-class-name: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME:marketplace}
    password: ${SPRING_DATASOURCE_PASSWORD:marketplace}
  sql:
    init:
      mode: always

marketplace:
  notification-runtime:
    arachne:
      model-mode: ${MARKETPLACE_NOTIFICATION_ARACHNE_MODEL_MODE:deterministic}

arachne:
  strands:
    agents:
      notification-agent:
        system-prompt: "You are notification-agent inside notification-service. Query notification_template_lookup before producing structured notification composition for case outcomes."
        built-ins:
          inherit-defaults: false

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health