server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: marketplace-shipment-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/marketplace_shipment_service}
    driver-class-name: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME:marketplace}
    password: ${SPRING_DATASOURCE_PASSWORD:marketplace}
  sql:
    init:
      mode: always

marketplace:
  shipment-runtime:
    arachne:
      model-mode: ${MARKETPLACE_SHIPMENT_ARACHNE_MODEL_MODE:deterministic}

arachne:
  strands:
    agents:
      shipment-agent:
        system-prompt: "You are shipment-agent inside shipment-service. Query shipment_record_lookup before producing structured shipment evidence or specialist review summaries."
        built-ins:
          inherit-defaults: false

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health