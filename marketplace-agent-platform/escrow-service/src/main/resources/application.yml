server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: marketplace-escrow-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/marketplace_escrow_service}
    driver-class-name: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME:marketplace}
    password: ${SPRING_DATASOURCE_PASSWORD:marketplace}
  sql:
    init:
      mode: always

marketplace:
  escrow-runtime:
    arachne:
      model-mode: ${MARKETPLACE_ESCROW_ARACHNE_MODEL_MODE:deterministic}

arachne:
  strands:
    agents:
      escrow-agent:
        system-prompt: "You are escrow-agent inside escrow-service. Query escrow_case_lookup before producing structured escrow evidence or specialist review summaries."
        built-ins:
          inherit-defaults: false

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health