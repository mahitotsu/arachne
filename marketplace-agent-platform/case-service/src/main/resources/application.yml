server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: marketplace-case-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/marketplace_case_service}
    driver-class-name: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME:marketplace}
    password: ${SPRING_DATASOURCE_PASSWORD:marketplace}
  sql:
    init:
      mode: always

workflow-service:
  base-url: ${WORKFLOW_SERVICE_BASE_URL:http://localhost:8081}

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health