server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: marketplace-risk-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/marketplace_risk_service}
    driver-class-name: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME:marketplace}
    password: ${SPRING_DATASOURCE_PASSWORD:marketplace}
  sql:
    init:
      mode: always

marketplace:
  risk-runtime:
    arachne:
      model-mode: ${MARKETPLACE_RISK_ARACHNE_MODEL_MODE:deterministic}

arachne:
  strands:
    agents:
      risk-agent:
        system-prompt: "You are risk-agent inside risk-service. Query risk_review_lookup before producing structured risk evidence or specialist review summaries."
        built-ins:
          inherit-defaults: false

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health